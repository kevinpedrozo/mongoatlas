<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Práctica 2 - Despliegue</title>
    
    <div class="d-grid mt-3">
        <a href="registros.php" class="btn btn-dark">
            Ver personas registradas
        </a>
    </div>

    <style>
        /* Fuentes pesadas e impactantes de Google Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Teko:wght@600;700&family=Space+Grotesk:wght@500;700&display=swap');

        body {
            /* Fondo ultra oscuro con un degradado que simula las luces del ring */
            background: radial-gradient(circle at center, #1c1917 0%, #0c0a09 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Space Grotesk', sans-serif;
            padding: 30px;
            position: relative;
        }

        /* Efecto de luces rojas difuminadas de fondo (Las esquinas del ring) */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 10% 10%, rgba(220, 38, 38, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 90% 90%, rgba(220, 38, 38, 0.15) 0%, transparent 50%);
            z-index: 0;
            pointer-events: none;
        }

        .contenedor {
            width: 100%;
            max-width: 600px;
            position: relative;
            z-index: 1;
        }

        /* Estilo para el botón superior "Ver personas" */
        .d-grid .btn-dark {
            border-radius: 4px;
            padding: 12px;
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: transparent;
            border: 2px solid #44403c;
            color: #a8a29e;
            transition: all 0.3s;
            margin-bottom: 20px;
        }

        .d-grid .btn-dark:hover {
            border-color: #f59e0b;
            color: #f59e0b;
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.2);
        }

        /* Tarjeta principal estilo cartel de boxeo */
        .card {
            border: 3px solid #1c1917;
            border-radius: 0px; /* Bordes rectos y agresivos */
            overflow: hidden;
            box-shadow: 0px 30px 60px rgba(0,0,0,0.8);
            background: #141210;
        }

        /* Encabezado brutal */
        .card-header {
            background: #dc2626; /* Rojo de combate */
            color: #ffffff;
            text-align: center;
            padding: 30px 20px;
            border-bottom: 6px solid #f59e0b; /* Línea dorada */
            position: relative;
        }

        .card-header h2 {
            font-family: 'Teko', sans-serif;
            font-size: 42px;
            font-weight: 700;
            line-height: 0.9;
            letter-spacing: 1px;
            margin-bottom: 5px;
            text-transform: uppercase;
            text-shadow: 3px 3px 0px #7f1d1d;
        }

        .card-header p {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin: 0;
            color: #fef08a; /* Amarillo claro */
            font-weight: 700;
        }

        .card-body {
            padding: 40px;
            background: #141210;
        }

        .mb-3, .mb-4 {
            margin-bottom: 28px !important;
        }

        /* Etiquetas como las categorías de peso */
        .form-label {
            font-size: 13px;
            font-weight: 700;
            color: #ca8a04; /* Dorado oscuro texturizado */
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
            display: block;
            transition: color 0.3s;
        }

        .mb-3:focus-within .form-label,
        .mb-4:focus-within .form-label {
            color: #ef4444; /* Cambia a rojo cuando escribes */
        }

        /* Inputs oscuros y robustos */
        .form-control {
            border-radius: 0px; /* Sin curvas */
            padding: 14px;
            border: 2px solid #2e2a24;
            background-color: #1c1917;
            color: #f5f5f4;
            font-size: 16px;
            transition: all 0.25s ease-in-out;
        }

        .form-control:focus {
            background-color: #26221f;
            border-color: #ef4444; /* Borde rojo fuego al enfocar */
            box-shadow: 0px 0px 12px rgba(239, 68, 68, 0.4);
            color: #ffffff;
        }

        /* Botón de KO definitivo */
        .btn-primary {
            width: 100%;
            padding: 18px;
            border-radius: 0px;
            border: none;
            background: #f59e0b; /* Oro/Amarillo de campeón */
            color: #000000; /* Texto negro para máximo contraste */
            font-family: 'Teko', sans-serif;
            font-size: 28px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            line-height: 1;
            box-shadow: 0px 5px 0px #b45309; /* Sombra sólida estilo cómic/retro */
            transition: all 0.1s ease-in-out;
        }

        .btn-primary:hover {
            background: #f59e0b;
            color: #000000;
            transform: translateY(2px);
            box-shadow: 0px 3px 0px #b45309;
        }

        .btn-primary:active {
            transform: translateY(5px);
            box-shadow: 0px 0px 0px transparent;
        }

        /* Estilo para los textos que escriba el usuario dentro del input */
        ::placeholder {
            color: #57534e;
        }
    </style>

</head>

<body>

    <div class="contenedor">

        <div class="card">

            <div class="card-header">
                <h2>REGISTRO DE GUSTOS POR APRENDIZ</h2>
                <p>Formulario moderno con Bootstrap</p>
            </div>

            <div class="card-body">

                <form action="logica.php" method="post">

                    <div class="mb-3">
                        <label class="form-label">Apellidos:</label>
                        <input type="text" required maxlength="200" name="apellidos" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Nombres:</label>
                        <input type="text" required maxlength="200" name="nombres" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Color favorito:</label>
                        <input type="text" required maxlength="200" name="color" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Comida favorita:</label>
                        <input type="text" required maxlength="200" name="comida" class="form-control">
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Tipo de literatura y cine:</label>
                        <input type="text" required maxlength="200" name="pelicula" class="form-control">
                    </div>

                    <button type="submit" class="btn btn-primary">
                        Registrar mi respuesta
                    </button>

                </form>

            </div>

        </div>

    </div>

</body>
</html>
